# File: config.yaml
# BigQuery Sync Configuration - Multi-Table Format
#
# This demonstrates v1.0 features: multi-table sync with column selection.
# For legacy single-table format, see comments at bottom of file.

pluginModule: ./src/index.js

rest: true

graphqlSchema:
  files: 'schema/bigquery-ingestor.graphql'

jsResource:
  files: 'src/resources.js'

# Operations API Configuration (for dynamic table creation)
# When configured, Harper tables are created automatically based on BigQuery schema
# No schema.graphql definitions needed for data tables
operations:
  host: localhost
  port: 9925
  username: admin
  password: password # Change this to your Harper password

# Multi-Table BigQuery Configuration
bigquery:
  # Shared credentials and project settings
  projectId: irjudson-demo
  credentials: service-account-key.json
  location: US

  # Optional: Proxy configuration (applies to all BigQuery API calls)
  # Uncomment to enable proxy for corporate networks
  # proxy:
  #   enabled: false
  #   url: "http://proxy.vz.com:8080"

  # Define tables to sync (each syncs independently)
  tables:
    # Example 1: Standard table sync with column selection
    - id: vessel_positions
      dataset: maritime_tracking
      table: vessel_positions
      timestampColumn: timestamp
      columns: [timestamp, mmsi, vessel_name, latitude, longitude, speed_knots, heading, course]
      targetTable: VesselPositions
      sync:
        initialBatchSize: 10000
        catchupBatchSize: 1000
        steadyBatchSize: 500

    # Example 2: Standard table sync with all columns
    - id: port_events
      dataset: maritime_tracking
      table: port_events
      timestampColumn: event_time
      columns: [event_time, port_id, port_name, vessel_mmsi, event_type, latitude, longitude]
      targetTable: PortEvents
      sync:
        initialBatchSize: 5000
        catchupBatchSize: 500
        steadyBatchSize: 100
      # Optional: Enable streaming inserts for lower latency (has cost implications)
      # useStreamingAPIs: true

    # Example 3: Standard table sync with wildcard columns
    - id: vessel_metadata
      dataset: maritime_tracking
      table: vessel_metadata
      timestampColumn: last_updated
      columns: ['*']
      targetTable: VesselMetadata
      sync:
        initialBatchSize: 1000
        catchupBatchSize: 100
        steadyBatchSize: 10

    # Example 4: Custom SQL query with JOINs and transformations
    # Uncomment to use custom query instead of standard table sync
    # - id: enriched_vessel_events
    #   customQuery: |
    #     SELECT
    #       e.event_time as timestamp,
    #       e.vessel_mmsi,
    #       v.vessel_name,
    #       v.vessel_type,
    #       e.event_type,
    #       e.port_id,
    #       p.port_name,
    #       CONCAT(p.port_name, ', ', p.country) as location,
    #       e.latitude,
    #       e.longitude
    #     FROM `maritime_tracking.port_events` e
    #     LEFT JOIN `maritime_tracking.vessel_metadata` v ON e.vessel_mmsi = v.mmsi
    #     LEFT JOIN `maritime_tracking.ports` p ON e.port_id = p.id
    #     WHERE e.event_time > TIMESTAMP(@lastTimestamp)
    #       AND e.event_type IN ('ARRIVAL', 'DEPARTURE')
    #   timestampColumn: timestamp
    #   targetTable: EnrichedVesselEvents
    #   sync:
    #     initialBatchSize: 5000
    #     catchupBatchSize: 500
    #     steadyBatchSize: 100
    #
    # Note: customQuery must include @lastTimestamp variable for incremental sync
    # The query will be automatically wrapped with partitioning, ORDER BY, and LIMIT
    # Do NOT include ORDER BY or LIMIT in your custom query

# BigQuery Insert Method Configuration
# Two options available (configurable per table):
#
# 1. Load Job API (default):
#    - Free tier compatible (no per-row costs)
#    - Higher latency (seconds to minutes)
#    - Best for: development, batch workloads, cost-sensitive deployments
#    - Set useStreamingAPIs: false (or omit)
#
# 2. Streaming Insert API:
#    - Lower latency (sub-second to few seconds)
#    - Costs: $0.01 per 200 MB (minimum $0.01/day)
#    - Best for: production, real-time dashboards, low-latency requirements
#    - Set useStreamingAPIs: true
#
# Example: Enable streaming for time-sensitive events
#   - id: port_events
#     useStreamingAPIs: true  # Real-time events benefit from low latency

# Custom SQL Query Configuration
# You can use custom SQL queries instead of standard table sync for advanced use cases:
#
# Use cases:
# - JOIN multiple BigQuery tables
# - Apply transformations (CONCAT, CAST, etc.)
# - Filter data with complex WHERE conditions
# - Aggregate or compute derived fields
#
# Requirements:
# - Must include @lastTimestamp variable in WHERE clause for incremental sync
# - timestampColumn must still be specified (refers to column in query RESULTS)
# - Do NOT include ORDER BY or LIMIT (added automatically with partitioning)
#
# Example:
#   - id: my_custom_sync
#     customQuery: |
#       SELECT
#         t1.timestamp,
#         t1.id,
#         t2.name,
#         CONCAT(t1.city, ', ', t1.country) as location
#       FROM `dataset.table1` t1
#       LEFT JOIN `dataset.table2` t2 ON t1.id = t2.id
#       WHERE t1.timestamp > TIMESTAMP(@lastTimestamp)
#         AND t1.status = 'active'
#     timestampColumn: timestamp
#     targetTable: MyCustomData
#
# The plugin automatically wraps your query with:
# - Distributed partitioning (MOD-based sharding)
# - ORDER BY timestampColumn ASC
# - LIMIT for batch control

# Proxy Configuration
# Configure HTTP/HTTPS proxy for BigQuery API calls in corporate networks:
#
# proxy:
#   enabled: true
#   url: "http://proxy.company.com:8080"
#
# Supported formats:
# - HTTP proxy: "http://proxy.company.com:8080"
# - HTTPS proxy: "https://proxy.company.com:8443"
# - Authenticated: "http://username:password@proxy.company.com:8080"
#
# Note: Proxy applies to ALL BigQuery API calls but does NOT affect Harper replication

# Maritime vessel data synthesizer configuration
# When bigquery.tables is present, synthesizer uses multi-table orchestrator
# to generate data for ALL tables (vessel_positions, port_events, vessel_metadata).
# The dataset/table fields below are used as defaults for single-table mode.
synthesizer:
  dataset: maritime_tracking
  table: vessel_positions
  totalVessels: 100000
  batchSize: 100
  generationIntervalMs: 60000
  retentionDays: 30
  cleanupIntervalHours: 24

# Default settings
sync:
  # Start timestamp (ISO format) - omit to start from beginning
  # startTimestamp: "2024-01-01T00:00:00Z"

  # Batch sizes for different phases
  initialBatchSize: 10000
  catchupBatchSize: 1000
  steadyBatchSize: 500

  # Lag thresholds (seconds)
  catchupThreshold: 3600 # 1 hour
  steadyThreshold: 300 # 5 minutes

  # Polling interval in steady state (milliseconds)
  pollInterval: 30000 # 30 seconds

validation:
  enabled: true
  interval: 300 # Run every 5 minutes

retry:
  maxAttempts: 5
  backoffMultiplier: 2
  initialDelay: 1000 # milliseconds

# ============================================================================
# LEGACY SINGLE-TABLE FORMAT (still supported for backward compatibility)
# ============================================================================
# Uncomment and use this format if you only need to sync one table:
#
# bigquery:
#   projectId: irjudson-demo
#   dataset: maritime_tracking
#   table: vessel_positions
#   timestampColumn: timestamp
#   credentials: service-account-key.json
#   location: US
#   columns: [timestamp, mmsi, vessel_name, latitude, longitude, speed_knots]
#
# sync:
#   initialBatchSize: 10000
#   catchupBatchSize: 1000
#   steadyBatchSize: 500
#   pollInterval: 30000

